name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  BOXES_SKIP_DOWNLOAD: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check boxes/ tests/
      - name: Format check with ruff
        run: ruff format --check boxes/ tests/
      - name: Type check with mypy
        run: mypy boxes/ tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system deps (Qt)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxkbcommon0 libfontconfig1
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit + integration tests
        run: |
          pytest tests/test_models.py tests/test_util.py tests/test_imports.py tests/test_integration.py -v
      - name: Run E2E network + CLI tests
        run: |
          pytest tests/test_e2e.py::TestE2EVMFromNetwork tests/test_e2e.py::TestE2ECLICreate tests/test_e2e.py::TestE2EEdgeCases -v
      - name: Run download small-file tests
        run: |
          pytest tests/test_e2e.py::TestE2EDownload tests/test_e2e.py::TestE2ECLIDownload -v -k "not iso" --timeout=60

  test-iso:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install system deps (Qt + ISO tools)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libegl1-mesa libxkbcommon0 libfontconfig1 genisoimage
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Download Alpine ISO + run ISO-based E2E tests
        run: |
          BOXES_SKIP_DOWNLOAD=0 pytest tests/test_e2e.py::TestE2EVMFromISO tests/test_e2e.py::TestE2EDownload::test_download_iso_to_default_dir -v --timeout=600

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify wheel
        run: |
          pip install dist/*.whl
          python -c "import boxes; print(boxes.__version__)"
      - name: Verify CLI entry point
        run: |
          boxes --help
          boxes list
          boxes diagnose
